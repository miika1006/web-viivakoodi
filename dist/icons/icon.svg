<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="92" ry="92"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>
  <!-- Corner brackets -->
  <g fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Top-left -->
    <polyline points="120,196 120,120 196,120"/>
    <!-- Top-right -->
    <polyline points="316,120 392,120 392,196"/>
    <!-- Bottom-left -->
    <polyline points="120,316 120,392 196,392"/>
    <!-- Bottom-right -->
    <polyline points="392,316 392,392 316,392"/>
  </g>
  <!-- Barcode lines (vertical bars in center) -->
  <g fill="white" opacity="0.9" clip-path="url(#roundedClip)">
    <rect x="148" y="186" width="18" height="140" rx="3"/>
    <rect x="176" y="186" width="10" height="140" rx="2"/>
    <rect x="196" y="186" width="22" height="140" rx="3"/>
    <rect x="228" y="186" width="12" height="140" rx="2"/>
    <rect x="250" y="186" width="18" height="140" rx="3"/>
    <rect x="278" y="186" width="8"  height="140" rx="2"/>
    <rect x="296" y="186" width="20" height="140" rx="3"/>
    <rect x="326" y="186" width="12" height="140" rx="2"/>
    <rect x="348" y="186" width="16" height="140" rx="3"/>
  </g>
</svg>
